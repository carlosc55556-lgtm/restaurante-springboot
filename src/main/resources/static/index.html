<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restaurante Web - Inicio</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .login-box { max-width:600px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    header { text-align:center; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    .panel-buttons { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
    .panel-buttons button { padding:12px; font-size:16px; border:none; border-radius:6px; background:#2196f3; color:#fff; cursor:pointer; }
    .panel-buttons button:hover { background:#1976d2; }
    .registro-link { margin-top:20px; text-align:center; }
    .registro-link a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>🍽️ Bienvenido al Restaurante Web</h1>
    </header>

    <h2>Selecciona tu rol</h2>
    <p>Primero deberás iniciar sesión para acceder al panel correspondiente.</p>

    <div class="panel-buttons">
      <button onclick="redirigirLogin('ADMIN')">Administrador</button>
      <button onclick="redirigirLogin('CLIENTE')">Cliente</button>
      <button onclick="redirigirLogin('MOZO')">Mozo</button>
      <button onclick="redirigirLogin('JEFE')">Jefe de Mozos</button>
    </div>

    <p class="registro-link">
      ¿No tienes cuenta? <a href="registro.html">Registrarse aquí</a>
    </p>
  </div>

  <script>
    // Guardamos el rol seleccionado y redirigimos al login
    function redirigirLogin(rol) {
      localStorage.setItem("rolSeleccionado", rol);
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
