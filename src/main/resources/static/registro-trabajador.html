<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Trabajador</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="form-box">
        <header>
            <img src="/imagenes/logo.png" alt="Logo" class="logo">
            <h1>👨‍🍳 Registro de Trabajador</h1>
            <p>Solo administradores pueden registrar trabajadores.</p>
        </header>

        <div id="mensaje" class="alert"></div>

        <form id="formTrabajador" action="/auth/register-trabajador" method="post">
            <label for="nombre">Nombres:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="apellido">Apellidos:</label>
            <input type="text" id="apellido" name="apellido" required>

            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Correo:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <label for="rol">Rol:</label>
            <select id="rol" name="rol" required>
                <option value="MOZO">Mozo</option>
                <option value="JEFE_MOZO">Jefe de Mozos</option>
                <option value="ADMIN">Administrador</option>
            </select>

            <label for="cargo">Cargo:</label>
            <input type="text" id="cargo" name="cargo" placeholder="Ej: Mesero, Cocinero">

            <label for="dni">DNI:</label>
            <input type="text" id="dni" name="dni" maxlength="8">

            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono">

            <button type="submit">Registrar Trabajador</button>
        </form>

        <div class="volver-link">
            <a href="/admin.html">← Volver al Panel</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const msg = document.getElementById('mensaje');
        if (params.has('exito')) {
            msg.textContent = 'Trabajador registrado exitosamente!';
            msg.className = 'alert alert-success';
        }
        if (params.has('error')) {
            msg.textContent = 'Error: ' + params.get('error');
            msg.className = 'alert alert-error';
        }
    </script>
</body>
</html>
