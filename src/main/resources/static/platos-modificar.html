<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modificar Plato</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to right,#ff7e5f,#feb47b); margin:0; }
    .container { max-width:600px; margin:30px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); text-align:center; }
    h1 { margin-bottom:20px; }
    form { text-align:left; }
    label { display:block; margin:10px 0 5px; }
    input, textarea { width:100%; padding:8px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; }
    button { background:#2196f3; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#1976d2; }
    .volver { margin-top:20px; }
    .volver a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✏️ Modificar Plato</h1>
    <form>
      <label for="nombre">Nombre del Plato:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ejemplo: Lomo Saltado" required>

      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" name="descripcion" placeholder="Nueva descripción" required></textarea>

      <label for="precio">Precio:</label>
      <input type="number" id="precio" name="precio" step="0.01" placeholder="Ejemplo: 28.00" required>

      <button type="submit">Guardar Cambios</button>
    </form>
    <div class="volver">
      <a href="platos.html">⬅ Volver a Gestión de Platos</a>
    </div>
  </div>
</body>
</html>
