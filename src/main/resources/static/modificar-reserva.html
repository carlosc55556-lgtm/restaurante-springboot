<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modificar Reserva</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .login-box { max-width:600px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    header { text-align:center; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    form { display:flex; flex-direction:column; gap:10px; }
    input, textarea { padding:10px; border:1px solid #ccc; border-radius:5px; }
    button { padding:12px; border:none; border-radius:6px; background:#2196f3; color:#fff; cursor:pointer; }
    button:hover { background:#1976d2; }
    .registro-link { margin-top:20px; text-align:center; }
    .registro-link a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>✏️ Modificar Reserva</h1>
    </header>

    <form action="procesar-modificar-reserva" method="post">
      <label>ID Reserva:</label>
      <input type="text" name="id" value="R001" readonly>

      <label>Nombre del Cliente:</label>
      <input type="text" name="cliente" value="Juan Pérez">

      <label>Cantidad de Personas:</label>
      <input type="number" name="personas" value="4">

      <label>Fecha:</label>
      <input type="date" name="fecha" value="2026-06-15">

      <label>Hora:</label>
      <input type="time" name="hora" value="20:00">

      <label>Platos Reservados:</label>
      <textarea name="platos">Pollo a la Brasa, Ceviche</textarea>

      <button type="submit">Guardar Cambios</button>
    </form>

    <p class="registro-link">
      <a href="gestionar-reservas.html">⬅ Volver a Gestión de Reservas</a>
    </p>
  </div>
</body>
</html>
