<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Plato</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to right,#ff7e5f,#feb47b); margin:0; }
    .container { max-width:600px; margin:30px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); text-align:center; }
    h1 { margin-bottom:20px; }
    form { text-align:left; }
    label { display:block; margin:10px 0 5px; }
    input { width:100%; padding:8px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; }
    button { background:#e53935; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#c62828; }
    .volver { margin-top:20px; }
    .volver a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ Eliminar Plato</h1>
    <form>
      <label for="nombre">Nombre del Plato a Eliminar:</label>
      <input type="text" id="nombre" name="nombre" required>

      <button type="submit">Eliminar</button>
    </form>
    <div class="volver">
      <a href="admin.html">⬅ Volver al Panel del Administrador</a>
    </div>
  </div>
</body>
</html>
