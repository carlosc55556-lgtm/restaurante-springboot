<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Promociones del Día</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .container { max-width:900px; margin:0 auto; padding:20px; text-align:center;}
    h1 { margin-bottom:20px;}
    .promo { margin:15px 0; padding:15px; background:#fff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2);}
    .promo img { width:100%; max-width:250px; border-radius:8px;}
    .volver { margin-top:20px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>💸 Promociones del Día</h1>

    <div class="promo">
      <img src="imagenes/pollo.jpg" alt="Pollo a la Brasa">
      <h3>Combo Pollo a la Brasa</h3>
      <p>1/4 de pollo + papas + ensalada + bebida.</p>
      <p><strong>Antes: S/ 22.00 — Ahora: S/ 18.00</strong></p>
    </div>

    <div class="promo">
      <img src="imagenes/cevichemixto.jpg" alt="Ceviche">
      <h3>Ceviche Mixto</h3>
      <p>Incluye chicha morada gratis.</p>
      <p><strong>Antes: S/ 28.00 — Ahora: S/ 24.00</strong></p>
    </div>

    <div class="volver">
      <a href="menu.html">⬅ Volver al Menú</a>
    </div>
  </div>
</body>
</html>
