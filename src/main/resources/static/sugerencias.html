<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sugerencias del Chef</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .container { max-width:900px; margin:0 auto; padding:20px; text-align:center;}
    h1 { margin-bottom:20px;}
    .sugerencia { margin:15px 0; padding:15px; background:#fff; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2);}
    .sugerencia img { width:100%; max-width:250px; border-radius:8px;}
    .volver { margin-top:20px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>👨‍🍳 Sugerencias del Chef</h1>

    <div class="sugerencia">
      <img src="imagenes/seco.jpg" alt="Seco de Res">
      <h3>Seco de Res Especial</h3>
      <p>Preparado con receta tradicional y acompañado de vino de la casa.</p>
      <p><strong>S/ 32.00</strong></p>
    </div>

    <div class="sugerencia">
      <img src="imagenes/lomo.jpg" alt="Lomo Saltado">
      <h3>Lomo Saltado Gourmet</h3>
      <p>Con cortes premium y papas nativas.</p>
      <p><strong>S/ 35.00</strong></p>
    </div>

    <div class="volver">
      <a href="menu.html">⬅ Volver al Menú</a>
    </div>
  </div>

</html>
