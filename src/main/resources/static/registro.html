<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Restaurante</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b); }
    .login-box { max-width:500px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    header { text-align:center; margin-bottom:20px; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    h2 { margin-bottom:15px; color:#444; }
    form { display:flex; flex-direction:column; gap:12px; }
    label { font-weight:bold; color:#333; }
    input, select, button { padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; }
    button { background:#2196f3; color:#fff; cursor:pointer; }
    button:hover { background:#1976d2; }
    .password-container { display:flex; align-items:center; gap:5px; }
    .toggle-eye { cursor:pointer; }
    .registro-link { margin-top:15px; text-align:center; }
    .registro-link a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>🍽️ Registro Restaurante</h1>
    </header>

    <h2>Registro de Usuario</h2>

    <!-- ============================================================ -->
    <!-- ACTION: /auth/register (POST)                                -->
    <!-- name="username" (no "usuario") - coincide con entidad Usuario -->
    <!-- ============================================================ -->
    <form action="/auth/register" method="post">

      <label>Rol:</label>
      <select name="rol" required>
        <option value="CLIENTE">Cliente</option>
        <option value="MOZO">Mozo</option>
        <option value="ADMIN">Administrador</option>
        <option value="JEFE_MOZO">Jefe de mozos</option>
      </select>

      <label>Nombres:</label>
      <input type="text" name="nombre" placeholder="Tus nombres" required>

      <label>Apellidos:</label>
      <input type="text" name="apellido" placeholder="Tus apellidos" required>

      <!-- CORREGIDO: name="username" (no "usuario") -->
      <label>Nombre de usuario:</label>
      <input type="text" name="username" placeholder="Usuario único" required>

      <label>Correo:</label>
      <input type="email" name="email" placeholder="ejemplo@correo.com" required>

      <label>Dirección:</label>
      <input type="text" name="direccion" placeholder="Tu dirección">

      <label>Teléfono:</label>
      <input type="text" name="telefono" placeholder="999999999">

      <label>DNI:</label>
      <input type="text" name="dni" placeholder="Documento de identidad">

      <label>Fecha de nacimiento:</label>
      <input type="date" name="fechaNacimiento">

      <label>Contraseña:</label>
      <div class="password-container">
        <input type="password" id="password" name="password" placeholder="********" required>
        <span id="togglePassword" class="toggle-eye">👁️</span>
      </div>

      <button type="submit">Registrar</button>
    </form>

    <p class="registro-link">
      ¿Ya tienes cuenta? <a href="login.html">Volver al login</a>
    </p>
  </div>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
    });
  </script>
</body>
</html>
