<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Restaurante</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(to right,#ff7e5f,#feb47b);
    }
    .login-box {
      max-width:400px;
      margin:50px auto;
      padding:20px;
      background:#fff;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.2);
    }
    header { text-align:center; margin-bottom:20px; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    h2 { margin-bottom:15px; color:#444; }

    form { display:flex; flex-direction:column; gap:15px; }

    label { font-weight:bold; color:#333; }

    input {
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }

    .password-container {
      position:relative;
      width:100%;
    }

    .password-container input {
      width:100%;
      padding-right:40px;
      box-sizing:border-box;
    }

    .toggle-eye {
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:16px;
    }

    button {
      padding:12px;
      border:none;
      border-radius:6px;
      background:#2196f3;
      color:#fff;
      font-size:16px;
      cursor:pointer;
    }
    button:hover { background:#1976d2; }

    .registro-link {
      margin-top:15px;
      text-align:center;
    }
    .registro-link a {
      text-decoration:none;
      color:#ff7e5f;
      font-weight:bold;
    }

    /* Mensajes de error/éxito */
    .alert {
      padding:10px;
      border-radius:6px;
      margin-bottom:15px;
      font-size:14px;
      display:none;
    }
    .alert-error { background:#fdeaea; color:#c0392b; }
    .alert-success { background:#e8f5e9; color:#27ae60; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>🍽️ Restaurante Web</h1>
    </header>

    <h2>Por favor, inicia sesión</h2>

    <!-- Mensajes dinámicos por URL params -->
    <div id="msgError" class="alert alert-error">Usuario o contraseña incorrectos.</div>
    <div id="msgLogout" class="alert alert-success">Has cerrado sesión correctamente.</div>
    <div id="msgRegistro" class="alert alert-success">Registro exitoso. Inicia sesión.</div>

    <!-- ============================================================ -->
    <!-- ACTION CORREGIDO: /login (debe coincidir con SecurityConfig) -->
    <!-- ============================================================ -->
    <form action="/login" method="post">
      
      <!-- LABEL CORREGIDO: "Usuario" en vez de "Correo electrónico" -->
      <label for="username">Usuario:</label>
      <input type="text" id="username" name="username" 
             placeholder="Ingresa tu usuario" required autofocus>

      <label for="password">Contraseña:</label>
      <div class="password-container">
        <input type="password" id="password" name="password" 
               placeholder="********" required>
        <span id="togglePassword" class="toggle-eye">👁️</span>
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="registro-link">
      ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
    </p>
  </div>

  <script>
    // Mostrar/ocultar contraseña
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
    });

    // Mostrar mensajes según URL params (Spring Security redirige con ?error, ?logout)
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) document.getElementById('msgError').style.display = 'block';
    if (params.has('logout')) document.getElementById('msgLogout').style.display = 'block';
    if (params.has('registro')) document.getElementById('msgRegistro').style.display = 'block';
  </script>
</body>
</html>
