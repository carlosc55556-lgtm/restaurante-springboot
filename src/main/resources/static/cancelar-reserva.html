<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cancelar Reserva</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .login-box { max-width:600px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    header { text-align:center; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    .confirmacion { margin:20px 0; font-size:16px; }
    button { padding:12px; border:none; border-radius:6px; background:#e53935; color:#fff; cursor:pointer; }
    button:hover { background:#c62828; }
    .registro-link { margin-top:20px; text-align:center; }
    .registro-link a { text-decoration:none; color:#ff7e5f; font-weight:bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>🗑️ Cancelar Reserva</h1>
    </header>

    <div class="confirmacion">
      <p>¿Estás seguro que deseas cancelar la reserva <strong>ID R001</strong> de <strong>Juan Pérez</strong> para <strong>4 personas</strong> el <strong>2026-06-15 a las 20:00</strong>?</p>
    </div>

    <form action="procesar-cancelar-reserva" method="post">
      <input type="hidden" name="id" value="R001">
      <button type="submit">Sí, Cancelar Reserva</button>
    </form>

    <p class="registro-link">
      <a href="gestionar-reservas.html">⬅ Volver a Gestión de Reservas</a>
    </p>
  </div>
</body>
</html>
