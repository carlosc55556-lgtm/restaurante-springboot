<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mozos en Turno</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(to right,#ff7e5f,#feb47b);}
    .login-box { max-width:700px; margin:40px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    header { text-align:center; }
    .logo { width:80px; margin-bottom:10px; }
    h1 { margin-bottom:15px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:10px; text-align:center; }
    th { background:#f2f2f2; }
    .registro-link { margin-top:20px; text-align:center; }
    .registro-link a { text-decoration:none; color:#2196f3; font-weight:bold; }
  </style>
</head>
<body>
  <div class="login-box">
    <header>
      <img src="imagenes/logo.png" alt="Logo Restaurante" class="logo">
      <h1>👨‍🍳 Mozos en Turno</h1>
    </header>

    <h2>Listado de Mozos trabajando hoy</h2>
    <table>
      <tr>
        <th>ID Mozo</th>
        <th>Nombre</th>
        <th>Turno</th>
        <th>Estado</th>
      </tr>
      <!-- Ejemplo de datos -->
      <tr>
        <td>M001</td>
        <td>Carlos Ramírez</td>
        <td>Mañana</td>
        <td>Activo</td>
      </tr>
      <tr>
        <td>M002</td>
        <td>José Pérez</td>
        <td>Tarde</td>
        <td>Activo</td>
      </tr>
      <tr>
        <td>M003</td>
        <td>Juan López</td>
        <td>Noche</td>
        <td>Activo</td>
      </tr>
    </table>

    <p class="registro-link">
      <a href="jefe.html">⬅ Volver al Panel del Jefe de Mozos</a>
    </p>
  </div>
</body>
</html>
